# Publish the landing page (landing/) to GitHub Pages. This repo is PUBLIC, so Pages
# works on the free plan. Runs on landing changes and on manual dispatch.
name: pages
on:
  push:
    branches: [main]
    paths:
      - "landing/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: landing
      - id: deployment
        uses: actions/deploy-pages@v4
